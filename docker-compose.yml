services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      DB_URL: "postgres://${DB_USER}:${DB_PASSWORD}@${DB_SERVICE}:5432/${DB_NAME}?sslmode=disable"
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - sophro-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sophro -d sophro_db"]
      interval: 5s 
      timeout: 5s 
      retries: 5 
    networks:
      - sophro-network
    restart: unless-stopped 

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - sophro-network
    restart: unless-stopped

volumes:
  db-data:

networks:
  sophro-network:
    driver: bridge
